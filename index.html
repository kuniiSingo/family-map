<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家族マップ</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#f0f0f0;display:flex;justify-content:center;}
#app{width:100%;max-width:430px;height:100dvh;background:#f0f0f0;display:flex;flex-direction:column;}

.header{background:#fff;border-bottom:1px solid #e8e8e8;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100;}
.header-title{font-size:17px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:7px;}
.header-status{display:flex;align-items:center;gap:5px;font-size:11px;color:#999;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;}
.status-dot.on{background:#1D9E75;}

.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;z-index:100;}
.tab{flex:1;padding:9px 4px 7px;text-align:center;font-size:10px;color:#aaa;cursor:pointer;border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s;}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tab.active{color:#534AB7;border-bottom-color:#534AB7;}
.badge{background:#E24B4A;color:#fff;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:700;min-width:16px;display:none;}

.view{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.view.show{display:flex;}

/* ── MAP ── */
#leaflet-map{flex:0 0 300px;width:100%;z-index:1;}
.member-strip{overflow-x:auto;display:flex;gap:8px;padding:9px 12px;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;}
.member-chip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap;font-size:12px;background:#f5f5f5;transition:all .15s;}
.member-chip.sel{font-weight:700;}
.chip-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;}
.history-list{overflow-y:auto;flex:1;padding:8px 14px;background:#f7f7f7;}
.h-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #efefef;}
.h-item:last-child{border-bottom:none;}
.h-dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.h-time{font-size:11px;color:#bbb;width:44px;flex-shrink:0;}
.h-place{font-size:13px;color:#1a1a1a;line-height:1.4;}
.h-sub{font-size:11px;margin-top:2px;}
.no-data{text-align:center;padding:2rem;color:#ccc;font-size:13px;}

/* ── CHAT ── */
.chat-filter-bar{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;}
.cf-tab{padding:9px 14px;font-size:12px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;}
.cf-tab.active{color:#534AB7;border-bottom-color:#534AB7;font-weight:700;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;background:#f0f0f0;min-height:0;}
.msg-row{display:flex;gap:7px;align-items:flex-end;}
.msg-row.me{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.msg-name{font-size:10px;color:#aaa;margin-bottom:3px;padding-left:2px;}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row:not(.me) .msg-bubble{background:#fff;border-bottom-left-radius:4px;color:#1a1a1a;}
.msg-row.me .msg-bubble{background:#534AB7;color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:#ccc;margin-top:3px;padding:0 2px;}
.msg-row.me .msg-time{text-align:right;}

.chat-input-wrap{background:#fff;border-top:1px solid #e8e8e8;padding:8px 12px;flex-shrink:0;}
.voice-bar{display:none;align-items:center;gap:8px;padding:5px 10px;background:#fff0f0;border-radius:8px;margin-bottom:6px;font-size:12px;color:#A32D2D;}
.voice-bar.show{display:flex;}
.wave{display:flex;gap:2px;align-items:center;}
.wave span{width:3px;border-radius:2px;background:#E24B4A;animation:wave .7s ease-in-out infinite;}
.wave span:nth-child(1){height:5px;animation-delay:0s;}
.wave span:nth-child(2){height:12px;animation-delay:.1s;}
.wave span:nth-child(3){height:7px;animation-delay:.2s;}
.wave span:nth-child(4){height:14px;animation-delay:.3s;}
.wave span:nth-child(5){height:5px;animation-delay:.4s;}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.chat-row{display:flex;gap:8px;align-items:center;}
.chat-input{flex:1;padding:9px 14px;border:1px solid #e0e0e0;border-radius:22px;font-size:14px;background:#f8f8f8;outline:none;}
.chat-input:focus{border-color:#534AB7;background:#fff;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.mic-btn{background:#f0f0f0;color:#666;}
.mic-btn.rec{background:#E24B4A;color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.send-btn{background:#534AB7;color:#fff;}

/* ── MEMBERS ── */
.members-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.m-card{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:12px;margin-bottom:8px;border:1px solid #efefef;}
.m-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;}
.m-name{font-size:15px;font-weight:700;color:#1a1a1a;}
.m-status{font-size:12px;margin-top:2px;}
.del-btn{margin-left:auto;background:none;border:none;color:#ddd;cursor:pointer;font-size:22px;padding:4px 8px;}
.add-btn-m{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:#fff;border:1.5px dashed #c8c0f0;border-radius:12px;color:#534AB7;font-size:14px;cursor:pointer;width:100%;font-weight:600;}

/* ── SETTINGS ── */
.settings-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.s-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;border:1px solid #efefef;}
.s-card h3{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.s-card p{font-size:13px;color:#888;line-height:1.65;margin-bottom:10px;}
.s-input{width:100%;padding:10px 13px;border:1px solid #e0e0e0;border-radius:9px;font-size:14px;margin-bottom:10px;-webkit-appearance:none;}
.s-input:focus{border-color:#534AB7;outline:none;}
.share-url-box{font-size:12px;color:#534AB7;background:#f2f0ff;padding:10px 12px;border-radius:8px;word-break:break-all;margin-bottom:10px;font-family:monospace;line-height:1.5;}
.btn-green{padding:9px 18px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font-size:13px;cursor:pointer;font-weight:700;}
.btn-purple{padding:9px 18px;background:#534AB7;color:#fff;border:none;border-radius:9px;font-size:13px;cursor:pointer;font-weight:700;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:22px 18px 36px;width:100%;max-width:430px;}
.modal-box h2{font-size:16px;font-weight:700;margin-bottom:14px;}
.m-input{width:100%;padding:10px 13px;border:1px solid #e0e0e0;border-radius:10px;font-size:14px;margin-bottom:13px;-webkit-appearance:none;}
.m-input:focus{border-color:#534AB7;outline:none;}
.color-row{display:flex;gap:10px;margin-bottom:18px;}
.col-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.col-opt.sel{border-color:#1a1a1a;transform:scale(1.1);}
.modal-btns{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:12px;background:#f5f5f5;border:none;border-radius:10px;font-size:14px;cursor:pointer;}
.btn-add{flex:1;padding:12px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700;}

/* ── LOC PROMPT ── */
.loc-prompt{background:#fffbe6;border:1px solid #f5c842;border-radius:10px;padding:11px 14px;margin:10px 14px 0;font-size:13px;color:#7a5800;display:none;align-items:center;gap:8px;flex-shrink:0;}
.loc-prompt.show{display:flex;}
.loc-btn{margin-left:auto;background:#534AB7;color:#fff;border:none;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-weight:700;white-space:nowrap;}

/* ── TOAST ── */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(26,26,26,.88);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:600;white-space:nowrap;}
.toast.show{opacity:1;}

/* Leaflet カスタムピン */
.l-pin{display:flex;flex-direction:column;align-items:center;}
.l-circle{width:36px;height:36px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.l-tail{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;margin:0 auto;}
.l-label{background:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:1px;box-shadow:0 1px 3px rgba(0,0,0,.15);white-space:nowrap;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-title">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      家族マップ
    </div>
    <div class="header-status">
      <div class="status-dot" id="sdot"></div>
      <span id="stxt">接続中...</span>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" id="tab-map" onclick="showTab('map')">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      マップ
    </div>
    <div class="tab" id="tab-chat" onclick="showTab('chat')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      メッセージ<span class="badge" id="mbadge"></span>
    </div>
    <div class="tab" id="tab-members" onclick="showTab('members')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      メンバー
    </div>
    <div class="tab" id="tab-settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </div>
  </div>

  <!-- MAP TAB -->
  <div class="view show" id="view-map">
    <div class="loc-prompt" id="loc-prompt">
      📍 位置情報を共有して家族に居場所を知らせましょう
      <button class="loc-btn" onclick="startGPS()">許可する</button>
    </div>
    <div id="leaflet-map"></div>
    <div class="member-strip" id="member-strip"></div>
    <div class="history-list" id="history-list"></div>
  </div>

  <!-- CHAT TAB -->
  <div class="view" id="view-chat">
    <div class="chat-filter-bar" id="cf-bar"></div>
    <div class="chat-msgs" id="chat-msgs"></div>
    <div class="chat-input-wrap">
      <div class="voice-bar" id="vbar">
        <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
        <span>音声認識中... タップで停止</span>
      </div>
      <div class="chat-row">
        <button class="icon-btn mic-btn" id="micbtn" onclick="toggleMic()">
          <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <input class="chat-input" id="chat-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button class="icon-btn send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- MEMBERS TAB -->
  <div class="view" id="view-members">
    <div class="members-scroll">
      <div id="members-list"></div>
      <button class="add-btn-m" onclick="openModal()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        メンバーを追加
      </button>
    </div>
  </div>

  <!-- SETTINGS TAB -->
  <div class="view" id="view-settings">
    <div class="settings-scroll">
      <div class="s-card">
        <h3>👤 自分の名前を設定</h3>
        <p>この名前でマップとメッセージに表示されます</p>
        <input class="s-input" id="name-input" placeholder="例：お父さん"/>
        <button class="btn-green" onclick="saveName()">保存する</button>
      </div>
      <div class="s-card">
        <h3>🔗 家族を招待</h3>
        <p>このURLをLINEやメールで送ると、同じマップを家族と共有できます</p>
        <div class="share-url-box" id="share-url"></div>
        <button class="btn-purple" onclick="copyUrl()">URLをコピー</button>
      </div>
      <div class="s-card">
        <h3>ℹ️ アプリについて</h3>
        <p>Firebase Realtime Database + OpenStreetMap（Leaflet）を使用しています。位置情報はGPSが更新されるたびに送信され、行動履歴は直近10件を保存します。</p>
      </div>
    </div>
  </div>
</div>

<!-- ADD MEMBER MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal-box">
    <h2>メンバーを追加</h2>
    <input class="m-input" id="new-name" placeholder="名前（例：お母さん）"/>
    <div class="color-row">
      <div class="col-opt sel" data-c="#534AB7" style="background:#534AB7" onclick="pickCol(this)"></div>
      <div class="col-opt" data-c="#1D9E75" style="background:#1D9E75" onclick="pickCol(this)"></div>
      <div class="col-opt" data-c="#D85A30" style="background:#D85A30" onclick="pickCol(this)"></div>
      <div class="col-opt" data-c="#D4537E" style="background:#D4537E" onclick="pickCol(this)"></div>
      <div class="col-opt" data-c="#378ADD" style="background:#378ADD" onclick="pickCol(this)"></div>
      <div class="col-opt" data-c="#BA7517" style="background:#BA7517" onclick="pickCol(this)"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-add" onclick="addMember()">追加</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ── Firebase ─────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyCAqdtRI_yi_nASWboBAfCUwumFO1JjPMw",
  authDomain: "family-map-d99a8.firebaseapp.com",
  databaseURL: "https://family-map-d99a8-default-rtdb.firebaseio.com",
  projectId: "family-map-d99a8",
  storageBucket: "family-map-d99a8.appspot.com",
  messagingSenderId: "958721717620",
  appId: "1:958721717620:web:9c6630dee9f5201b2a6821"
});
const db = firebase.database();

// ── ローカル状態 ──────────────────────────────────
let myId = localStorage.getItem('fm_id') || ('u_' + Math.random().toString(36).slice(2,9));
let myName = localStorage.getItem('fm_name') || '';
let myColor = localStorage.getItem('fm_color') || '#534AB7';
localStorage.setItem('fm_id', myId);

let members = {};
let messages = [];
let chatFilter = 'all';
let selMember = null;
let micOn = false;
let recognition = null;
let unread = 0;
let lastRead = Date.now();

// ── Leaflet 初期化 ────────────────────────────────
const map = L.map('leaflet-map', {
  center: [35.6812, 139.7671],
  zoom: 15,
  zoomControl: true,
  attributionControl: false
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);
L.control.attribution({prefix: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'}).addTo(map);

// メンバーごとのLeafletレイヤー
const leafletMarkers = {};  // id -> L.marker
const leafletPolylines = {}; // id -> L.polyline
const leafletDots = {};      // id -> L.circleMarker[]

function makeIcon(name, color) {
  const ini = (name||'?')[0];
  const html = `<div class="l-pin">
    <div class="l-circle" style="background:${color};">${ini}</div>
    <div class="l-tail" style="border-top:8px solid ${color};"></div>
    <div class="l-label" style="color:${color};border:1px solid ${color}20;">${name}</div>
  </div>`;
  return L.divIcon({ html, className: '', iconSize: [60, 60], iconAnchor: [30, 50] });
}

function updateLeafletMember(id, m) {
  if(!m.lat || !m.lng) return;
  const latlng = [m.lat, m.lng];
  const color = m.color || '#534AB7';
  const hist = m.history || [];

  // マーカー
  if(leafletMarkers[id]) {
    leafletMarkers[id].setLatLng(latlng).setIcon(makeIcon(m.name, color));
  } else {
    leafletMarkers[id] = L.marker(latlng, { icon: makeIcon(m.name, color) }).addTo(map);
  }

  // 軌跡ライン
  if(hist.length >= 2) {
    const pts = hist.map(h => [h.lat, h.lng]);
    if(leafletPolylines[id]) {
      leafletPolylines[id].setLatLngs(pts);
    } else {
      leafletPolylines[id] = L.polyline(pts, {
        color, weight: 3, dashArray: '6,5', opacity: 0.6
      }).addTo(map);
    }
  }

  // 過去地点の丸
  (leafletDots[id] || []).forEach(d => map.removeLayer(d));
  leafletDots[id] = hist.slice(0, -1).map(h =>
    L.circleMarker([h.lat, h.lng], {
      radius: 4, fillColor: color, color: '#fff',
      weight: 1.5, fillOpacity: 0.7, opacity: 1
    }).addTo(map)
  );
}

function removeLeafletMember(id) {
  if(leafletMarkers[id]) { map.removeLayer(leafletMarkers[id]); delete leafletMarkers[id]; }
  if(leafletPolylines[id]) { map.removeLayer(leafletPolylines[id]); delete leafletPolylines[id]; }
  (leafletDots[id] || []).forEach(d => map.removeLayer(d));
  delete leafletDots[id];
}

function fitMapToMembers() {
  const pts = Object.values(members).filter(m => m.lat).map(m => [m.lat, m.lng]);
  if(pts.length === 1) { map.setView(pts[0], 16); }
  else if(pts.length > 1) { map.fitBounds(pts, { padding: [40, 40] }); }
}

// ── Firebase リスナー ─────────────────────────────
db.ref('.info/connected').on('value', s => {
  const ok = s.val();
  document.getElementById('sdot').className = 'status-dot' + (ok ? ' on' : '');
  document.getElementById('stxt').textContent = ok ? '接続済み' : '再接続中...';
});

db.ref('members').on('value', snap => {
  const prev = Object.keys(members);
  members = snap.val() || {};
  const cur = Object.keys(members);

  // 削除されたメンバーのレイヤーを除去
  prev.filter(id => !cur.includes(id)).forEach(removeLeafletMember);

  // 更新・追加
  cur.forEach(id => updateLeafletMember(id, members[id]));

  if(!selMember || !members[selMember]) selMember = cur[0] || null;

  renderMemberStrip();
  renderHistory();
  renderMembersList();
  renderChatTabs();
});

db.ref('messages').limitToLast(100).on('value', snap => {
  const raw = snap.val() || {};
  messages = Object.values(raw).sort((a, b) => a.ts - b.ts);
  const newUnread = messages.filter(m => m.senderId !== myId && m.ts > lastRead).length;
  unread = newUnread;
  const badge = document.getElementById('mbadge');
  const chatVisible = document.getElementById('view-chat').classList.contains('show');
  if(unread > 0 && !chatVisible) {
    badge.style.display = '';
    badge.textContent = unread > 9 ? '9+' : unread;
  } else {
    badge.style.display = 'none';
  }
  renderMessages();
});

// ── GPS ──────────────────────────────────────────
let gpsWatch = null;
function startGPS() {
  if(!navigator.geolocation) { toast('位置情報に対応していません'); return; }
  if(!myName) { toast('先に設定タブで名前を登録してください'); showTab('settings'); return; }
  document.getElementById('loc-prompt').classList.remove('show');
  if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch = navigator.geolocation.watchPosition(pos => {
    pushLoc(pos.coords.latitude, pos.coords.longitude);
  }, () => {
    toast('位置情報を取得できませんでした');
    document.getElementById('loc-prompt').classList.add('show');
  }, { enableHighAccuracy: true, maximumAge: 20000, timeout: 15000 });
}

function pushLoc(lat, lng) {
  const ref = db.ref('members/' + myId);
  ref.once('value').then(snap => {
    const cur = snap.val() || {};
    const hist = cur.history || [];
    hist.push({ lat, lng, ts: Date.now() });
    if(hist.length > 10) hist.splice(0, hist.length - 10);
    ref.set({ name: myName, color: myColor, lat, lng, updatedAt: Date.now(), history: hist });
  });
}

// ── メンバーUI ────────────────────────────────────
function ini(n) { return (n || '?')[0]; }
function isOnline(m) { return m.updatedAt && Date.now() - m.updatedAt < 5 * 60000; }

function renderMemberStrip() {
  const el = document.getElementById('member-strip');
  const ids = Object.keys(members);
  if(!ids.length) { el.innerHTML = '<span style="font-size:12px;color:#ccc;padding:4px 0;">メンバーがいません</span>'; return; }
  el.innerHTML = ids.map(id => {
    const m = members[id];
    const sel = id === selMember;
    return `<div class="member-chip ${sel?'sel':''}" style="background:${sel?m.color+'18':'#f5f5f5'};border-color:${sel?m.color:'transparent'};" onclick="selectMember('${id}')">
      <div class="chip-av" style="background:${m.color};">${ini(m.name)}</div>
      <span style="color:${sel?m.color:'#666'};">${m.name}</span>
      <span style="width:6px;height:6px;border-radius:50%;background:${isOnline(m)?'#1D9E75':'#ddd'};"></span>
    </div>`;
  }).join('');
}

function selectMember(id) {
  selMember = id;
  renderMemberStrip();
  renderHistory();
  // 選択したメンバーの位置にフォーカス
  const m = members[id];
  if(m && m.lat) map.setView([m.lat, m.lng], 16, { animate: true });
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if(!selMember || !members[selMember]) {
    el.innerHTML = '<div class="no-data">メンバーを選択してください</div>'; return;
  }
  const m = members[selMember];
  const hist = (m.history || []).slice().reverse();
  if(!hist.length) {
    el.innerHTML = `<div class="no-data">${m.name}の位置情報はまだありません</div>`; return;
  }
  el.innerHTML = `<div style="font-size:11px;color:#aaa;padding:4px 0 8px;font-weight:700;">${m.name}の行動履歴</div>` +
    hist.map((h, i) => {
      const d = new Date(h.ts);
      const t = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
      const diff = Math.round((Date.now() - h.ts) / 60000);
      const ago = diff < 1 ? 'たった今' : diff < 60 ? `${diff}分前` : `${Math.round(diff/60)}時間前`;
      return `<div class="h-item" onclick="map.setView([${h.lat},${h.lng}],17,{animate:true});showTab('map');" style="cursor:pointer;">
        <div class="h-dot" style="background:${i===0?m.color:m.color+'66'};"></div>
        <div class="h-time">${t}</div>
        <div>
          <div class="h-place">📍 ${h.lat.toFixed(5)}, ${h.lng.toFixed(5)}</div>
          <div class="h-sub" style="color:${i===0?m.color:'#bbb'};">${i===0?'現在地 · '+ago:ago}</div>
        </div>
      </div>`;
    }).join('');
}

function renderMembersList() {
  const el = document.getElementById('members-list');
  const ids = Object.keys(members);
  if(!ids.length) { el.innerHTML = '<div class="no-data">メンバーがいません</div>'; return; }
  el.innerHTML = ids.map(id => {
    const m = members[id];
    return `<div class="m-card">
      <div class="m-av" style="background:${m.color};">${ini(m.name)}</div>
      <div style="flex:1;">
        <div class="m-name">${m.name}${id===myId?' <span style="font-size:11px;color:#aaa;font-weight:400;">(自分)</span>':''}</div>
        <div class="m-status" style="color:${isOnline(m)?'#1D9E75':'#ccc'};">${isOnline(m)?'● オンライン':'● オフライン'}</div>
      </div>
      ${id !== myId ? `<button class="del-btn" onclick="removeMember('${id}')">×</button>` : ''}
    </div>`;
  }).join('');
}

// ── チャット ─────────────────────────────────────
function renderChatTabs() {
  const bar = document.getElementById('cf-bar');
  bar.innerHTML = `<div class="cf-tab ${chatFilter==='all'?'active':''}" onclick="setFilter('all')">全員</div>` +
    Object.entries(members).map(([id, m]) =>
      `<div class="cf-tab ${chatFilter===id?'active':''}" onclick="setFilter('${id}')" style="display:flex;align-items:center;gap:4px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${m.color};display:inline-block;"></span>${m.name}
      </div>`
    ).join('');
}

function setFilter(f) { chatFilter = f; renderChatTabs(); renderMessages(); }

function renderMessages() {
  const filtered = chatFilter === 'all' ? messages : messages.filter(m => m.senderId === chatFilter);
  const el = document.getElementById('chat-msgs');
  if(!filtered.length) {
    el.innerHTML = '<div style="text-align:center;color:#ccc;font-size:13px;padding:2rem;">メッセージはまだありません</div>'; return;
  }
  el.innerHTML = filtered.map(msg => {
    const s = members[msg.senderId] || { name: msg.senderName || '?', color: '#888' };
    const isMe = msg.senderId === myId;
    const d = new Date(msg.ts);
    const t = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    return `<div>
      ${!isMe ? `<div class="msg-name" style="padding-left:37px;color:${s.color};">${s.name}</div>` : ''}
      <div class="msg-row ${isMe?'me':''}">
        ${!isMe ? `<div class="msg-av" style="background:${s.color};">${ini(s.name)}</div>` : ''}
        <div>
          <div class="msg-bubble">${esc(msg.text)}</div>
          <div class="msg-time">${t}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  if(!myName) { toast('設定タブで名前を登録してください'); return; }
  db.ref('messages').push({ senderId: myId, senderName: myName, text, ts: Date.now() });
  inp.value = '';
}

// ── 音声入力 ─────────────────────────────────────
function toggleMic() {
  if(micOn) { stopMic(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { toast('Chromeブラウザが必要です'); return; }
  micOn = true;
  document.getElementById('micbtn').classList.add('rec');
  document.getElementById('vbar').classList.add('show');
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onresult = e => {
    document.getElementById('chat-input').value = Array.from(e.results).map(r => r[0].transcript).join('');
  };
  recognition.onend = stopMic;
  recognition.onerror = stopMic;
  recognition.start();
}
function stopMic() {
  micOn = false;
  document.getElementById('micbtn').classList.remove('rec');
  document.getElementById('vbar').classList.remove('show');
  if(recognition) { recognition.stop(); recognition = null; }
}

// ── メンバー追加・削除 ────────────────────────────
let selCol = '#534AB7';
function pickCol(el) {
  selCol = el.dataset.c;
  document.querySelectorAll('.col-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}
function openModal() { document.getElementById('modal').classList.add('show'); document.getElementById('new-name').value = ''; }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function addMember() {
  const name = document.getElementById('new-name').value.trim();
  if(!name) { toast('名前を入力してください'); return; }
  const id = 'u_' + Math.random().toString(36).slice(2,9);
  db.ref('members/' + id).set({ name, color: selCol, history: [] });
  closeModal();
  toast(name + ' を追加しました');
}
function removeMember(id) {
  if(!confirm(`「${members[id]?.name}」を削除しますか？`)) return;
  db.ref('members/' + id).remove();
}

// ── 設定 ─────────────────────────────────────────
function initSettings() {
  document.getElementById('name-input').value = myName;
  document.getElementById('share-url').textContent = location.href;
}
function saveName() {
  const name = document.getElementById('name-input').value.trim();
  if(!name) { toast('名前を入力してください'); return; }
  myName = name;
  localStorage.setItem('fm_name', myName);
  db.ref('members/' + myId).update({ name: myName, color: myColor });
  toast('保存しました');
  document.getElementById('loc-prompt').classList.add('show');
}
function copyUrl() {
  navigator.clipboard.writeText(location.href).then(() => toast('URLをコピーしました'));
}

// ── タブ切替 ─────────────────────────────────────
function showTab(t) {
  ['map','chat','members','settings'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('show', v===t);
    const tab = document.getElementById('tab-'+v);
    if(tab) tab.classList.toggle('active', v===t);
  });
  if(t === 'map') { setTimeout(() => map.invalidateSize(), 50); }
  if(t === 'chat') {
    lastRead = Date.now(); unread = 0;
    document.getElementById('mbadge').style.display = 'none';
    renderChatTabs(); renderMessages();
  }
  if(t === 'settings') initSettings();
}

// ── トースト ─────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ── 起動 ─────────────────────────────────────────
window.addEventListener('load', () => {
  setTimeout(() => map.invalidateSize(), 100);
  if(!myName) {
    toast('設定タブから名前を登録してください');
  } else {
    document.getElementById('loc-prompt').classList.add('show');
    db.ref('members/' + myId).once('value').then(s => {
      if(!s.val()) db.ref('members/' + myId).set({ name: myName, color: myColor, history: [] });
    });
  }
});
</script>
