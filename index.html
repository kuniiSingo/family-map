<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>家族マップ</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家族マップ">
<meta name="theme-color" content="#534AB7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:#000;}

/* ── ONBOARDING ── */
#onboarding{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f2f2f7;padding:32px 24px;}
#onboarding.hide{animation:fadeOut .4s ease forwards;}
@keyframes fadeOut{to{opacity:0;pointer-events:none;}}
.ob-logo{width:64px;height:64px;background:#534AB7;border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.ob-title{font-size:26px;font-weight:700;color:#1a1a1a;margin-bottom:6px;text-align:center;}
.ob-sub{font-size:14px;color:#888;text-align:center;margin-bottom:36px;line-height:1.6;}
.ob-card{background:#fff;border:1px solid #e5e5ea;border-radius:20px;padding:24px;width:100%;max-width:340px;box-shadow:0 2px 16px rgba(0,0,0,.08);}
.ob-label{font-size:12px;color:#888;margin-bottom:6px;font-weight:500;}
.ob-input{width:100%;padding:12px 14px;background:#f8f8f8;border:1px solid #e0e0e0;border-radius:12px;color:#1a1a1a;font-size:15px;margin-bottom:14px;-webkit-appearance:none;outline:none;}
.ob-input::placeholder{color:#bbb;}
.ob-input:focus{border-color:#534AB7;background:#fff;}
.ob-btn{width:100%;padding:14px;background:#7F77DD;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:4px;}
.ob-btn:active{opacity:.8;}
.ob-err{font-size:12px;color:#F09595;margin-top:-8px;margin-bottom:10px;min-height:16px;}
.ob-divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.ob-divider span{font-size:11px;color:#bbb;white-space:nowrap;}
.ob-divider::before,.ob-divider::after{content:'';flex:1;height:1px;background:#e5e5ea;}
.ob-step{display:none;}
.ob-step.active{display:block;}
.ob-back{background:none;border:none;color:#aaa;font-size:13px;cursor:pointer;padding:8px 0;display:block;text-align:center;width:100%;margin-top:8px;}

/* ── APP ── */
#app{width:100%;height:100dvh;display:flex;flex-direction:column;background:#f0f0f0;}
.header{background:#fff;border-bottom:1px solid #e8e8e8;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50;}
.header-title{font-size:16px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;gap:6px;}
.header-status{display:flex;align-items:center;gap:5px;font-size:11px;color:#999;}
.sdot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;}
.sdot.on{background:#1D9E75;}
.tab-bar{display:flex;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;z-index:50;}
.tab{flex:1;padding:9px 4px 7px;text-align:center;font-size:10px;color:#aaa;cursor:pointer;border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:2px;transition:color .15s;}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tab.active{color:#534AB7;border-bottom-color:#534AB7;}
.badge{background:#E24B4A;color:#fff;border-radius:8px;font-size:9px;padding:1px 5px;font-weight:700;min-width:16px;display:none;}

.view{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.view.show{display:flex;}

/* ── MAP（全画面） ── */
#view-map{position:relative;flex:1;min-height:0;overflow:hidden;}
#leaflet-map{width:100%;z-index:1;display:block;}

/* マップ上のUI */
.map-ui{position:absolute;z-index:10;pointer-events:none;}
.map-ui *{pointer-events:auto;}

/* メンバーチップ（上部） */
#member-chips{top:12px;left:0;right:0;display:flex;gap:8px;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:center;flex-wrap:nowrap;}
#member-chips::-webkit-scrollbar{display:none;}
.mchip{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;white-space:nowrap;font-size:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.mchip.sel{font-weight:700;box-shadow:0 2px 10px rgba(0,0,0,.2);}
.chip-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;}

/* 現在地ボタン: position:fixedで確実に最前面に表示 */
#locate-btn{position:fixed;bottom:72px;right:16px;width:48px;height:48px;background:#fff;border:none;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.28);transition:transform .15s;z-index:400;}
#locate-btn.visible{display:flex;}
#locate-btn:active{transform:scale(.93);}
#locate-btn svg{width:22px;height:22px;stroke:#534AB7;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* 行動履歴パネル: position:fixedでマップの上に確実に表示 */
#history-panel{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.22);max-height:55%;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);z-index:400;}
#history-panel.show{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;}
.panel-title{font-size:14px;font-weight:700;color:#1a1a1a;}
.panel-close{background:none;border:none;font-size:22px;color:#ccc;cursor:pointer;padding:0 4px;line-height:1;}
.panel-list{overflow-y:auto;padding:4px 16px 20px;max-height:calc(55vh - 80px);}
.h-item{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.h-item:last-child{border-bottom:none;}
.h-dot{width:9px;height:9px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.h-time{font-size:11px;color:#bbb;width:44px;flex-shrink:0;}
.h-place{font-size:13px;color:#1a1a1a;line-height:1.4;}
.h-sub{font-size:11px;margin-top:1px;}

/* ── CHAT ── */
.cf-bar{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid #e8e8e8;flex-shrink:0;}
.cf-tab{padding:9px 14px;font-size:12px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;}
.cf-tab.active{color:#534AB7;border-bottom-color:#534AB7;font-weight:700;}

.chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;background:#f0f0f0;min-height:0;}

/* メッセージのイージングアニメーション */
@keyframes msgIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes msgInMe{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.msg-wrap{animation:msgIn .3s cubic-bezier(.34,1.56,.64,1) both;display:flex;flex-direction:column;align-items:flex-start;width:100%;}
.msg-wrap.me{animation:msgInMe .3s cubic-bezier(.34,1.56,.64,1) both;align-items:flex-end;width:100%;}
.msg-row{display:flex;gap:7px;align-items:flex-end;}
.msg-row.me{flex-direction:row-reverse;}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.msg-name{font-size:10px;color:#aaa;margin-bottom:3px;padding-left:2px;}
.msg-bubble{max-width:72%;padding:9px 13px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg-row:not(.me) .msg-bubble{background:#fff;border-bottom-left-radius:4px;color:#1a1a1a;}
.msg-row.me .msg-bubble{background:#534AB7;color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:#ccc;margin-top:3px;padding:0 4px;}
.msg-wrap.me .msg-time{text-align:right;}
.msg-wrap:not(.me) .msg-time{text-align:left;padding-left:37px;}

.chat-input-wrap{background:#fff;border-top:1px solid #e8e8e8;padding:8px 12px;flex-shrink:0;}
.vbar{display:none;align-items:center;gap:8px;padding:5px 10px;background:#fff0f0;border-radius:8px;margin-bottom:6px;font-size:12px;color:#A32D2D;}
.vbar.show{display:flex;}
.wave{display:flex;gap:2px;align-items:center;}
.wave span{width:3px;border-radius:2px;background:#E24B4A;animation:wave .7s ease-in-out infinite;}
.wave span:nth-child(1){height:5px;animation-delay:0s;}
.wave span:nth-child(2){height:12px;animation-delay:.1s;}
.wave span:nth-child(3){height:7px;animation-delay:.2s;}
.wave span:nth-child(4){height:14px;animation-delay:.3s;}
.wave span:nth-child(5){height:5px;animation-delay:.4s;}
@keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.8)}}
.chat-row{display:flex;gap:8px;align-items:center;}
.chat-input{flex:1;padding:9px 14px;border:1px solid #e0e0e0;border-radius:22px;font-size:14px;background:#f8f8f8;outline:none;}
.chat-input:focus{border-color:#534AB7;background:#fff;}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.mic-btn{background:#f0f0f0;color:#666;}
.mic-btn.rec{background:#E24B4A;color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.send-btn{background:#534AB7;color:#fff;}

/* ── MEMBERS ── */
.members-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.m-card{display:flex;align-items:center;gap:12px;padding:12px;background:#fff;border-radius:12px;margin-bottom:8px;border:1px solid #efefef;}
.m-av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;}
.m-name{font-size:15px;font-weight:700;color:#1a1a1a;}
.m-status{font-size:12px;margin-top:2px;}
.del-btn{margin-left:auto;background:none;border:none;color:#ddd;cursor:pointer;font-size:22px;padding:4px 8px;}
.add-btn-m{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;background:#fff;border:1.5px dashed #c8c0f0;border-radius:12px;color:#534AB7;font-size:14px;cursor:pointer;width:100%;font-weight:600;}

/* ── SETTINGS ── */
.settings-scroll{flex:1;overflow-y:auto;padding:12px 14px;}
.s-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;border:1px solid #efefef;}
.s-card h3{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.s-card p{font-size:13px;color:#888;line-height:1.65;margin-bottom:10px;}
.s-input{width:100%;padding:10px 13px;border:1px solid #e0e0e0;border-radius:9px;font-size:14px;margin-bottom:10px;-webkit-appearance:none;}
.s-input:focus{border-color:#534AB7;outline:none;}
.share-url-box{font-size:12px;color:#534AB7;background:#f2f0ff;padding:10px 12px;border-radius:8px;word-break:break-all;margin-bottom:10px;font-family:monospace;line-height:1.5;}
.invite-code-box{font-size:22px;font-weight:700;letter-spacing:6px;color:#534AB7;background:#f2f0ff;padding:14px;border-radius:8px;text-align:center;margin-bottom:10px;font-family:monospace;}
.btn-green{padding:9px 18px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font-size:13px;cursor:pointer;font-weight:700;}
.btn-purple{padding:9px 18px;background:#534AB7;color:#fff;border:none;border-radius:9px;font-size:13px;cursor:pointer;font-weight:700;}
.btn-danger{padding:9px 18px;background:#fff;color:#E24B4A;border:1px solid #E24B4A;border-radius:9px;font-size:13px;cursor:pointer;font-weight:700;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:flex-end;justify-content:center;}
.modal-bg.show{display:flex;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:22px 18px 36px;width:100%;max-width:430px;}
.modal-box h2{font-size:16px;font-weight:700;margin-bottom:14px;}
.m-input{width:100%;padding:10px 13px;border:1px solid #e0e0e0;border-radius:10px;font-size:14px;margin-bottom:13px;-webkit-appearance:none;}
.m-input:focus{border-color:#534AB7;outline:none;}
.color-row{display:flex;gap:10px;margin-bottom:18px;}
.col-opt{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .15s;}
.col-opt.sel{border-color:#1a1a1a;transform:scale(1.1);}
.modal-btns{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:12px;background:#f5f5f5;border:none;border-radius:10px;font-size:14px;cursor:pointer;}
.btn-add{flex:1;padding:12px;background:#534AB7;color:#fff;border:none;border-radius:10px;font-size:14px;cursor:pointer;font-weight:700;}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(26,26,26,.9);color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:900;white-space:nowrap;}
.toast.show{opacity:1;}

/* Leaflet pin */
.l-pin{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.l-circle{width:36px;height:36px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.l-label{background:#fff;border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;margin-top:1px;box-shadow:0 1px 3px rgba(0,0,0,.15);white-space:nowrap;}
</style>
</head>
<body>

<!-- ── ONBOARDING ── -->
<div id="onboarding">
  <div class="ob-logo">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
  </div>
  <div class="ob-title">家族マップ</div>
  <div class="ob-sub">家族の居場所をリアルタイムで共有</div>

  <div class="ob-card">
    <!-- STEP 1: 招待コード入力 -->
    <div class="ob-step active" id="ob-s1">
      <div class="ob-label">招待コード</div>
      <input class="ob-input" id="ob-code" placeholder="例：FAMI-1234" maxlength="9" oninput="formatCode(this)"/>
      <div class="ob-err" id="ob-err1"></div>
      <button class="ob-btn" onclick="checkCode()">次へ</button>
      <div class="ob-divider"><span>はじめての方は</span></div>
      <button class="ob-btn" style="background:#f0eeff;color:#534AB7;" onclick="goStep('ob-s3')">新しく家族グループを作る</button>
    </div>

    <!-- STEP 2: 名前入力（招待コードあり） -->
    <div class="ob-step" id="ob-s2">
      <div class="ob-label">あなたの名前</div>
      <input class="ob-input" id="ob-name" placeholder="例：お父さん"/>
      <div class="ob-label" style="margin-top:4px;">アイコンカラー</div>
      <div class="color-row" id="ob-colors" style="margin-bottom:16px;">
        <div class="col-opt sel" data-c="#534AB7" style="background:#534AB7;" onclick="pickObColor(this)"></div>
        <div class="col-opt" data-c="#1D9E75" style="background:#1D9E75;" onclick="pickObColor(this)"></div>
        <div class="col-opt" data-c="#D85A30" style="background:#D85A30;" onclick="pickObColor(this)"></div>
        <div class="col-opt" data-c="#D4537E" style="background:#D4537E;" onclick="pickObColor(this)"></div>
        <div class="col-opt" data-c="#378ADD" style="background:#378ADD;" onclick="pickObColor(this)"></div>
      </div>
      <div class="ob-err" id="ob-err2"></div>
      <button class="ob-btn" onclick="completeOnboarding()">アプリを始める</button>
      <button class="ob-back" onclick="goStep('ob-s1')">← 戻る</button>
    </div>

    <!-- STEP 3: 新規グループ作成 -->
    <div class="ob-step" id="ob-s3">
      <div class="ob-label">グループ名</div>
      <input class="ob-input" id="ob-group" placeholder="例：山田家"/>
      <div class="ob-label">あなたの名前</div>
      <input class="ob-input" id="ob-name2" placeholder="例：お父さん"/>
      <div class="ob-label" style="margin-top:4px;">アイコンカラー</div>
      <div class="color-row" id="ob-colors2" style="margin-bottom:16px;">
        <div class="col-opt sel" data-c="#534AB7" style="background:#534AB7;" onclick="pickObColor2(this)"></div>
        <div class="col-opt" data-c="#1D9E75" style="background:#1D9E75;" onclick="pickObColor2(this)"></div>
        <div class="col-opt" data-c="#D85A30" style="background:#D85A30;" onclick="pickObColor2(this)"></div>
        <div class="col-opt" data-c="#D4537E" style="background:#D4537E;" onclick="pickObColor2(this)"></div>
        <div class="col-opt" data-c="#378ADD" style="background:#378ADD;" onclick="pickObColor2(this)"></div>
      </div>
      <div class="ob-err" id="ob-err3"></div>
      <button class="ob-btn" onclick="createGroup()">グループを作成</button>
      <button class="ob-back" onclick="goStep('ob-s1')">← 戻る</button>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app" style="opacity:0;pointer-events:none;transition:opacity .3s;">
  <div class="header">
    <div class="header-title">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="group-name-header">家族マップ</span>
    </div>
    <div class="header-status">
      <div class="sdot" id="sdot"></div>
      <span id="stxt">接続中...</span>
    </div>
  </div>

  <div class="tab-bar">
    <div class="tab active" id="tab-map" onclick="showTab('map')">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      マップ
    </div>
    <div class="tab" id="tab-chat" onclick="showTab('chat')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      メッセージ<span class="badge" id="mbadge"></span>
    </div>
    <div class="tab" id="tab-members" onclick="showTab('members')">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      メンバー
    </div>
    <div class="tab" id="tab-settings" onclick="showTab('settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
// ── Firebase ─────────────────────────────────────
firebase.initializeApp({
  apiKey: "AIzaSyCAqdtRI_yi_nASWboBAfCUwumFO1JjPMw",
  authDomain: "family-map-d99a8.firebaseapp.com",
  databaseURL: "https://family-map-d99a8-default-rtdb.firebaseio.com",
  projectId: "family-map-d99a8",
  storageBucket: "family-map-d99a8.appspot.com",
  messagingSenderId: "958721717620",
  appId: "1:958721717620:web:9c6630dee9f5201b2a6821"
});
const db = firebase.database();

// ── ローカル状態 ──────────────────────────────────
let myId     = localStorage.getItem('fm_id')      || '';
let myName   = localStorage.getItem('fm_name')    || '';
let myColor  = localStorage.getItem('fm_color')   || '#534AB7';
let groupId  = localStorage.getItem('fm_group')   || '';
let groupName= localStorage.getItem('fm_gname')   || '';
let inviteCode = localStorage.getItem('fm_code')  || '';

let members  = {};
let messages = [];
let chatFilter = 'all';
let selMember  = null;
let micOn      = false;
let recognition= null;
let unread     = 0;
let lastRead   = Date.now();
let gpsWatch   = null;
let obColor    = '#534AB7';
let obColor2   = '#534AB7';
let selCol     = '#534AB7';

// ── URLから招待コードを自動読み込み ──────────────
const urlCode = new URLSearchParams(location.search).get('code');
if(urlCode) {
  // URLパラメータはハイフンなし(ABCD1234)で渡ってくるので整形して挿入
  let raw = urlCode.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if(raw.length > 4) raw = raw.slice(0,4) + '-' + raw.slice(4,8);
  document.getElementById('ob-code').value = raw;
}

// ── セッションチェック ────────────────────────────
if(myId && myName && groupId) {
  // 認証済み: オンボーディングを即非表示にしてアプリ起動
  const ob = document.getElementById('onboarding');
  ob.style.display = 'none';
  startApp();
} else {
  document.getElementById('onboarding').style.display = 'flex';
}

// ── オンボーディング ──────────────────────────────
function goStep(id) {
  document.querySelectorAll('.ob-step').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function formatCode(input) {
  let v = input.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase();
  if(v.length > 4) v = v.slice(0,4) + '-' + v.slice(4,8);
  input.value = v;
}

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c = '';
  for(let i=0;i<8;i++) c += chars[Math.floor(Math.random()*chars.length)];
  return c.slice(0,4) + '-' + c.slice(4);
}

function checkCode() {
  const code = document.getElementById('ob-code').value.trim().toUpperCase();
  document.getElementById('ob-err1').textContent = '';
  if(code.length < 9) { document.getElementById('ob-err1').textContent = '招待コードを正しく入力してください'; return; }
  const codeKey = code.replaceAll('-','');
  db.ref('groups').orderByChild('code').equalTo(codeKey).once('value').then(snap => {
    if(!snap.val()) { document.getElementById('ob-err1').textContent = '招待コードが見つかりません。確認してください。'; return; }
    const gid = Object.keys(snap.val())[0];
    groupId   = gid;
    groupName = snap.val()[gid].name;
    inviteCode = code;
    localStorage.setItem('fm_group', groupId);
    localStorage.setItem('fm_gname', groupName);
    localStorage.setItem('fm_code',  inviteCode);
    goStep('ob-s2');
  });
}

function pickObColor(el) {
  obColor = el.dataset.c;
  document.querySelectorAll('#ob-colors .col-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}
function pickObColor2(el) {
  obColor2 = el.dataset.c;
  document.querySelectorAll('#ob-colors2 .col-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}

function completeOnboarding() {
  const name = document.getElementById('ob-name').value.trim();
  document.getElementById('ob-err2').textContent = '';
  if(!name) { document.getElementById('ob-err2').textContent = '名前を入力してください'; return; }
  myId    = 'u_' + Math.random().toString(36).slice(2,9);
  myName  = name;
  myColor = obColor;
  localStorage.setItem('fm_id',    myId);
  localStorage.setItem('fm_name',  myName);
  localStorage.setItem('fm_color', myColor);
  localStorage.setItem('fm_group', groupId);
  localStorage.setItem('fm_gname', groupName);
  localStorage.setItem('fm_code',  inviteCode);
  db.ref(`groups/${groupId}/members/${myId}`).set({ name: myName, color: myColor, history: [] });
  hideOnboarding();
}

function createGroup() {
  const gname = document.getElementById('ob-group').value.trim();
  const name  = document.getElementById('ob-name2').value.trim();
  document.getElementById('ob-err3').textContent = '';
  if(!gname) { document.getElementById('ob-err3').textContent = 'グループ名を入力してください'; return; }
  if(!name)  { document.getElementById('ob-err3').textContent = '名前を入力してください'; return; }

  const code = generateCode();
  groupId   = 'g_' + Math.random().toString(36).slice(2,9);
  groupName = gname;
  inviteCode= code;
  myId      = 'u_' + Math.random().toString(36).slice(2,9);
  myName    = name;
  myColor   = obColor2;

  localStorage.setItem('fm_id',    myId);
  localStorage.setItem('fm_name',  myName);
  localStorage.setItem('fm_color', myColor);
  localStorage.setItem('fm_group', groupId);
  localStorage.setItem('fm_gname', groupName);
  localStorage.setItem('fm_code',  inviteCode);

  const codeKey = code.replaceAll('-','');
  db.ref(`groups/${groupId}`).set({
    name: groupName,
    code: codeKey,
    createdAt: Date.now(),
    members: { [myId]: { name: myName, color: myColor, history: [] } }
  });
  hideOnboarding();
}

function hideOnboarding() {
  const ob = document.getElementById('onboarding');
  ob.classList.add('hide');
  setTimeout(() => { ob.style.display = 'none'; }, 400);
  startApp();
}

function logout() {
  if(!confirm('ログアウトしますか？\nこのデバイスのデータが削除されます。')) return;
  ['fm_id','fm_name','fm_color','fm_group','fm_gname','fm_code'].forEach(k => localStorage.removeItem(k));
  location.reload();
}

// ── アプリ起動 ────────────────────────────────────
function startApp() {
  // localStorageから最新値を再読み込み（ブラウザ再起動後も確実に復元）
  myId       = localStorage.getItem('fm_id')    || myId;
  myName     = localStorage.getItem('fm_name')  || myName;
  myColor    = localStorage.getItem('fm_color') || myColor;
  groupId    = localStorage.getItem('fm_group') || groupId;
  groupName  = localStorage.getItem('fm_gname') || groupName;
  inviteCode = localStorage.getItem('fm_code')  || inviteCode;

  const appEl = document.getElementById('app');
  appEl.style.opacity = '1';
  appEl.style.pointerEvents = 'auto';
  document.getElementById('group-name-header').textContent = groupName || '家族マップ';

  initLeaflet();
  startFirebaseListeners();
  startGPS();
  // 初期表示後にもサイズ再計算
  setTimeout(() => { if(map) map.invalidateSize(); }, 500);
  document.getElementById('locate-btn').classList.add('visible');

  // 設定画面の招待コード表示
  document.getElementById('invite-code-display').textContent = inviteCode || '------';
  document.getElementById('share-url-display').textContent =
    `${location.origin}${location.pathname}?code=${(inviteCode||'').replaceAll('-','')}`;
  document.getElementById('name-input').value = myName;
}

// ── Leaflet ───────────────────────────────────────
let map;
const leafletMarkers   = {};
const leafletPolylines = {};
const leafletDots      = {};

function initLeaflet() {
  // #leaflet-mapに直接サイズを指定してLeafletを確実に初期化
  const mapEl = document.getElementById('leaflet-map');
  const viewMap = document.getElementById('view-map');
  const app = document.getElementById('app');

  // ヘッダーとタブバーの高さを引いた残り全部をマップに使う
  function getMapHeight() {
    const appH = window.innerHeight;
    const header = document.querySelector('.header');
    const tabbar = document.querySelector('.tab-bar');
    const hh = header ? header.offsetHeight : 48;
    const th = tabbar ? tabbar.offsetHeight : 50;
    return appH - hh - th;
  }

  const h = getMapHeight();
  mapEl.style.height = h + 'px';
  mapEl.style.width = '100%';

  map = L.map('leaflet-map', {
    center: [35.6812, 139.7671],
    zoom: 15,
    zoomControl: false,
    attributionControl: false
  });
  // 起動時に現在地へ移動
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      map.setView([pos.coords.latitude, pos.coords.longitude], 16, {animate:false});
      pushLoc(pos.coords.latitude, pos.coords.longitude);
    }, () => {});
  }
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    subdomains: ['a','b','c']
  }).addTo(map);
  L.control.attribution({
    prefix: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
  }).addTo(map);
  L.control.zoom({ position: 'bottomleft' }).addTo(map);

  // リサイズ対応
  window.addEventListener('resize', () => {
    if(map) {
      mapEl.style.height = getMapHeight() + 'px';
      map.invalidateSize();
    }
  });

  setTimeout(() => { if(map) map.invalidateSize(); }, 300);
}

function makeIcon(name, color) {
  return L.divIcon({
    html: `<div class="l-pin">
      <div class="l-circle" style="background:${color};">${(name||'?')[0]}</div>
      <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:9px solid ${color};margin:0 auto;"></div>
      <div class="l-label" style="color:${color};border:1px solid ${color}30;">${name}</div>
    </div>`,
    className:'', iconSize:[60,62], iconAnchor:[30,54]
  });
}

function updateLeafletMember(id, m) {
  if(!m.lat || !m.lng) return;
  const ll    = [m.lat, m.lng];
  const color = m.color || '#534AB7';
  const hist  = m.history || [];

  if(leafletMarkers[id]) {
    leafletMarkers[id].setLatLng(ll).setIcon(makeIcon(m.name, color));
  } else {
    leafletMarkers[id] = L.marker(ll, { icon: makeIcon(m.name, color) })
      .addTo(map)
      .on('click', () => openHistory(id));
  }

  if(hist.length >= 2) {
    const pts = hist.map(h => [h.lat, h.lng]);
    if(leafletPolylines[id]) leafletPolylines[id].setLatLngs(pts);
    else leafletPolylines[id] = L.polyline(pts,{color,weight:3,dashArray:'6,5',opacity:.55}).addTo(map);
  }
  (leafletDots[id]||[]).forEach(d => map.removeLayer(d));
  leafletDots[id] = hist.slice(0,-1).map(h =>
    L.circleMarker([h.lat,h.lng],{radius:4,fillColor:color,color:'#fff',weight:1.5,fillOpacity:.7}).addTo(map)
  );
}

function removeLeafletMember(id) {
  if(leafletMarkers[id])   { map.removeLayer(leafletMarkers[id]);   delete leafletMarkers[id];   }
  if(leafletPolylines[id]) { map.removeLayer(leafletPolylines[id]); delete leafletPolylines[id]; }
  (leafletDots[id]||[]).forEach(d => map.removeLayer(d));
  delete leafletDots[id];
}

// ── Firebase リスナー ─────────────────────────────
function startFirebaseListeners() {
  db.ref('.info/connected').on('value', s => {
    const ok = s.val();
    document.getElementById('sdot').className = 'sdot' + (ok?' on':'');
    document.getElementById('stxt').textContent = ok ? '接続済み' : '再接続中...';
  });

  db.ref(`groups/${groupId}/members`).on('value', snap => {
    const prev = Object.keys(members);
    members = snap.val() || {};
    const cur = Object.keys(members);
    prev.filter(id => !cur.includes(id)).forEach(removeLeafletMember);
    cur.forEach(id => updateLeafletMember(id, members[id]));
    if(!selMember || !members[selMember]) selMember = cur[0] || null;
    renderMemberChips();
    renderMembersList();
    renderChatTabs();
  });

  db.ref(`groups/${groupId}/messages`).limitToLast(100).on('value', snap => {
    const raw  = snap.val() || {};
    const prev = messages.length;
    messages   = Object.values(raw).sort((a,b) => a.ts - b.ts);
    const newUnread = messages.filter(m => m.senderId !== myId && m.ts > lastRead).length;
    unread = newUnread;
    const badge     = document.getElementById('mbadge');
    const chatVisible = document.getElementById('view-chat').classList.contains('show');
    if(unread > 0 && !chatVisible) { badge.style.display=''; badge.textContent = unread > 9 ? '9+' : unread; }
    else badge.style.display = 'none';
    renderMessages(messages.length > prev); // 新着のみアニメーション
  });
}

// ── アプリ復帰時の再接続 ────────────────────────────
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible') {
    // 画面復帰時にFirebase接続を確認・GPSを再取得
    if(groupId) {
      db.ref(`groups/${groupId}/members`).once('value').then(snap => {
        const m = snap.val() || {};
        Object.keys(m).forEach(id => updateLeafletMember(id, m[id]));
        renderMemberChips();
        renderMembersList();
      });
    }
    // GPS位置を即時取得して送信
    if(myName && navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => pushLoc(pos.coords.latitude, pos.coords.longitude),
        () => {}
      );
    }
  }
});

// ── GPS ──────────────────────────────────────────
function startGPS() {
  if(!navigator.geolocation) return;
  if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch = navigator.geolocation.watchPosition(
    pos => pushLoc(pos.coords.latitude, pos.coords.longitude),
    () => {},
    { enableHighAccuracy:true, maximumAge:20000, timeout:15000 }
  );
}

function pushLoc(lat, lng) {
  const ref = db.ref(`groups/${groupId}/members/${myId}`);
  ref.once('value').then(snap => {
    const cur  = snap.val() || {};
    const hist = cur.history || [];
    hist.push({ lat, lng, ts: Date.now() });
    if(hist.length > 10) hist.splice(0, hist.length - 10);
    ref.set({ name:myName, color:myColor, lat, lng, updatedAt:Date.now(), history:hist });
  });
}

// 現在地ボタン
function locateMe() {
  if(!navigator.geolocation) { showToast('位置情報に対応していません'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 17, { animate:true });
    pushLoc(pos.coords.latitude, pos.coords.longitude);
  }, () => showToast('位置情報を取得できませんでした'));
}

// ── メンバーUI ────────────────────────────────────
function ini(n) { return (n||'?')[0]; }
function isOnline(m) { return m.updatedAt && Date.now() - m.updatedAt < 5*60000; }

function renderMemberChips() {
  const el   = document.getElementById('member-chips');
  const ids  = Object.keys(members);
  el.innerHTML = ids.map(id => {
    const m   = members[id];
    const sel = id === selMember;
    return `<div class="mchip ${sel?'sel':''}"
      style="background:${sel?'#fff':'rgba(255,255,255,.88)'};border-color:${sel?m.color:'transparent'};"
      onclick="selectMember('${id}')">
      <div class="chip-av" style="background:${m.color};">${ini(m.name)}</div>
      <span style="color:${sel?m.color:'#444'};">${m.name}</span>
      <span style="width:6px;height:6px;border-radius:50%;background:${isOnline(m)?'#1D9E75':'#ddd'};"></span>
    </div>`;
  }).join('');
}

function selectMember(id) {
  selMember = id;
  renderMemberChips();
  const m = members[id];
  if(m && m.lat) map.setView([m.lat, m.lng], 16, { animate:true });
  openHistory(id);
}

// 行動履歴パネル（ピンタップ or チップタップで表示）
function openHistory(id) {
  selMember = id;
  renderMemberChips();
  const m    = members[id];
  const hist = (m.history || []).slice().reverse();
  const color= m.color || '#534AB7';

  document.getElementById('panel-title').textContent = `${m.name}の行動履歴`;
  const list = document.getElementById('panel-list');
  if(!hist.length) {
    list.innerHTML = '<div style="text-align:center;color:#ccc;font-size:13px;padding:1rem;">位置情報はまだありません</div>';
  } else {
    list.innerHTML = hist.map((h, i) => {
      const d    = new Date(h.ts);
      const t    = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const diff = Math.round((Date.now() - h.ts) / 60000);
      const ago  = diff < 1 ? 'たった今' : diff < 60 ? `${diff}分前` : `${Math.round(diff/60)}時間前`;
      return `<div class="h-item" onclick="map.setView([${h.lat},${h.lng}],17,{animate:true});closeHistory();" style="cursor:pointer;">
        <div class="h-dot" style="background:${i===0?color:color+'66'};"></div>
        <div class="h-time">${t}</div>
        <div>
          <div class="h-place">📍 ${h.lat.toFixed(4)}, ${h.lng.toFixed(4)}</div>
          <div class="h-sub" style="color:${i===0?color:'#bbb'};">${i===0?'現在地 · '+ago:ago}</div>
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('history-panel').classList.add('show');
}

function closeHistory() {
  document.getElementById('history-panel').classList.remove('show');
}

function renderMembersList() {
  const el  = document.getElementById('members-list');
  const ids = Object.keys(members);
  if(!ids.length) { el.innerHTML = '<div style="text-align:center;color:#ccc;font-size:13px;padding:2rem;">メンバーがいません</div>'; return; }
  el.innerHTML = ids.map(id => {
    const m = members[id];
    return `<div class="m-card">
      <div class="m-av" style="background:${m.color};">${ini(m.name)}</div>
      <div style="flex:1;">
        <div class="m-name">${m.name}${id===myId?' <span style="font-size:11px;color:#aaa;font-weight:400;">(自分)</span>':''}</div>
        <div class="m-status" style="color:${isOnline(m)?'#1D9E75':'#ccc'};">${isOnline(m)?'● オンライン':'● オフライン'}</div>
      </div>
      ${id!==myId?`<button class="del-btn" onclick="removeMember('${id}')">×</button>`:''}
    </div>`;
  }).join('');
}

// ── チャット ─────────────────────────────────────
function renderChatTabs() {
  const bar = document.getElementById('cf-bar');
  bar.innerHTML = `<div class="cf-tab ${chatFilter==='all'?'active':''}" onclick="setFilter('all')">全員</div>` +
    Object.entries(members).map(([id,m]) =>
      `<div class="cf-tab ${chatFilter===id?'active':''}" onclick="setFilter('${id}')" style="display:flex;align-items:center;gap:4px;">
        <span style="width:8px;height:8px;border-radius:50%;background:${m.color};display:inline-block;"></span>${m.name}
      </div>`
    ).join('');
}

function setFilter(f) { chatFilter = f; renderChatTabs(); renderMessages(false); }

let renderedCount = 0;
function renderMessages(animate) {
  const filtered = chatFilter==='all' ? messages : messages.filter(m => m.senderId===chatFilter);
  const el = document.getElementById('chat-msgs');
  const isNew = filtered.length > renderedCount;
  renderedCount = filtered.length;

  if(!filtered.length) {
    el.innerHTML = '<div style="text-align:center;color:#ccc;font-size:13px;padding:2rem;">メッセージはまだありません</div>';
    return;
  }
  el.innerHTML = filtered.map((msg, idx) => {
    const s    = members[msg.senderId] || { name: msg.senderName||'?', color:'#888' };
    const isMe = msg.senderId === myId;
    const d    = new Date(msg.ts);
    const t    = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const delay= animate && idx >= filtered.length - 3 ? `animation-delay:${(idx-(filtered.length-3))*60}ms` : 'animation:none';
    return `<div class="msg-wrap ${isMe?'me':''}" style="${delay}">
      ${!isMe?`<div class="msg-name" style="padding-left:37px;color:${s.color};">${s.name}</div>`:''}
      <div class="msg-row ${isMe?'me':''}">
        ${!isMe?`<div class="msg-av" style="background:${s.color};">${ini(s.name)}</div>`:''}
        <div class="msg-bubble">${esc(msg.text)}</div>
      </div>
      <div class="msg-time">${t}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sendMsg() {
  const inp  = document.getElementById('chat-input');
  const text = inp.value.trim();
  if(!text) return;
  db.ref(`groups/${groupId}/messages`).push({ senderId:myId, senderName:myName, text, ts:Date.now() });
  inp.value = '';
  renderedCount = 0;
}

// ── 音声入力 ─────────────────────────────────────
function toggleMic() {
  if(micOn) { stopMic(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) { showToast('Chromeブラウザが必要です'); return; }
  micOn = true;
  document.getElementById('micbtn').classList.add('rec');
  document.getElementById('vbar').classList.add('show');
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onresult = e => {
    document.getElementById('chat-input').value = Array.from(e.results).map(r=>r[0].transcript).join('');
  };
  recognition.onend = stopMic;
  recognition.onerror = stopMic;
  recognition.start();
}
function stopMic() {
  micOn = false;
  document.getElementById('micbtn').classList.remove('rec');
  document.getElementById('vbar').classList.remove('show');
  if(recognition) { recognition.stop(); recognition = null; }
}

// ── メンバー追加・削除 ────────────────────────────
function pickCol(el) {
  selCol = el.dataset.c;
  document.querySelectorAll('#modal .col-opt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}
function openModal()  { document.getElementById('modal').classList.add('show'); document.getElementById('new-name').value=''; }
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function addMember() {
  const name = document.getElementById('new-name').value.trim();
  if(!name) { showToast('名前を入力してください'); return; }
  const id = 'u_' + Math.random().toString(36).slice(2,9);
  db.ref(`groups/${groupId}/members/${id}`).set({ name, color:selCol, history:[] });
  closeModal();
  showToast(name + ' を追加しました');
}
function removeMember(id) {
  if(!confirm(`「${members[id]?.name}」を削除しますか？`)) return;
  db.ref(`groups/${groupId}/members/${id}`).remove();
}

// ── 設定 ─────────────────────────────────────────
function saveName() {
  const name = document.getElementById('name-input').value.trim();
  if(!name) { showToast('名前を入力してください'); return; }
  myName = name;
  localStorage.setItem('fm_name', myName);
  db.ref(`groups/${groupId}/members/${myId}`).update({ name:myName });
  showToast('保存しました');
}
function copyInviteCode() {
  navigator.clipboard.writeText(inviteCode).then(() => showToast('招待コードをコピーしました'));
}
function copyShareUrl() {
  const url = `${location.origin}${location.pathname}?code=${(inviteCode||'').replaceAll('-','')}`;
  navigator.clipboard.writeText(url).then(() => showToast('URLをコピーしました'));
}

// ── タブ切替 ─────────────────────────────────────
function showTab(t) {
  ['map','chat','members','settings'].forEach(v => {
    document.getElementById('view-'+v).classList.toggle('show', v===t);
    const tab = document.getElementById('tab-'+v);
    if(tab) tab.classList.toggle('active', v===t);
  });
  if(t==='map') {
    setTimeout(() => { if(map) map.invalidateSize(); }, 50);
    setTimeout(() => { if(map) map.invalidateSize(); }, 300);
    setTimeout(() => { if(map) map.invalidateSize(); }, 800);
    document.getElementById('locate-btn').classList.add('visible');
    closeHistory();
  } else {
    document.getElementById('locate-btn').classList.remove('visible');
    closeHistory();
  }
  if(t==='chat') {
    lastRead = Date.now(); unread = 0;
    document.getElementById('mbadge').style.display = 'none';
    renderChatTabs(); renderMessages(false);
  }
}

// ── トースト ─────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
<script>
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => {
        // 新バージョンがあれば即時適用
        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing;
          newSW.addEventListener('statechange', () => {
            if(newSW.state === 'installed' && navigator.serviceWorker.controller) {
              newSW.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });
        // 定期的に更新確認（1分ごと）
        setInterval(() => reg.update(), 60000);
      })
      .catch(() => {});
  });
  // SW更新時にページをリロード
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    window.location.reload();
  });
}
</script>
